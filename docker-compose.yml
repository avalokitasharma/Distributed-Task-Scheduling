version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: scheduler
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  auth-service:
    build: ./auth-service
    ports:
      - "8081:8081"
    environment:
      DB_DSN: postgres://admin:admin@postgres:5432/scheduler?sslmode=disable
      JWT_SECRET: supersecret
    depends_on:
      - postgres